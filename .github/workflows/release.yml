name: Release Desktop
run-name: ${{ github.ref_name }}

# Triggers:
#   - workflow_dispatch        — manual button in the Actions tab.
#   - push: tags v*            — Ethan tags + pushes, full release fires.
#   - push: branches main      — BUILD ONLY (no GitHub Release created).
#                                Smoke-tests the build chain on every commit
#                                so a tag push never lands on a broken main.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  compute-version:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(node -p "require('./package.json').version")"
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::package.json version '$app_version' is not semver."
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_name="Restream Chat++ ${release_tag}"
            should_publish=true
            is_tag_release=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="v${app_version}"
            release_name="Restream Chat++ v${app_version}"
            should_publish=true
            is_tag_release=false
          else
            release_tag="v${app_version}-build.${GITHUB_RUN_NUMBER}"
            release_name="Restream Chat++ v${app_version} (build ${GITHUB_RUN_NUMBER})"
            should_publish=false
            is_tag_release=false
          fi

          {
            echo "app_version=${app_version}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "should_publish=${should_publish}"
            echo "is_tag_release=${is_tag_release}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.slug }}
    needs: compute-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            slug: mac-arm64
            forge_args: --arch=arm64
            platform: darwin
          - runner: macos-13
            slug: mac-x64
            forge_args: --arch=x64
            platform: darwin
          - runner: windows-latest
            slug: win-x64
            forge_args: --arch=x64
            platform: win32
          - runner: ubuntu-latest
            slug: linux-x64
            forge_args: --arch=x64
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Linux package build deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg

      - name: Import Apple Developer certificate
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERT_P12_BASE64}" ] || [ -z "${APPLE_CERT_PASSWORD}" ]; then
            echo "::warning::Apple signing secrets not set — producing UNSIGNED macOS build."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "${APPLE_CERT_P12_BASE64}" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${APPLE_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S 'apple-tool:,apple:,codesign:' \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "Imported Apple Developer cert. Identities available:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build with Electron Forge
        env:
          APPLE_ID: ${{ matrix.platform == 'darwin' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'darwin' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'darwin' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_IDENTITY: ${{ matrix.platform == 'darwin' && secrets.APPLE_IDENTITY || '' }}
        run: npm run make -- ${{ matrix.forge_args }}

      - name: List build outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "--- out/make ---"
          find out/make -type f 2>/dev/null | sort || true

      - name: Stage release artefacts
        shell: bash
        env:
          APP_VERSION: ${{ needs.compute-version.outputs.app_version }}
          SLUG: ${{ matrix.slug }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          # macOS runners ship bash 3.2 which has no `globstar`; use `find`
          # for cross-shell recursive matching.
          mkdir -p release-staging

          stage_files() {
            local pattern="$1"
            local rename_to="$2"
            local count=0
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if [ -n "$rename_to" ]; then
                cp "$f" "release-staging/$rename_to"
              else
                cp "$f" "release-staging/"
              fi
              count=$((count + 1))
            done < <(find "out/make" -type f -name "$pattern" 2>/dev/null || true)
            echo "[stage] pattern=$pattern count=$count"
          }

          case "$PLATFORM" in
            darwin)
              stage_files "*.zip" "restream-chat-plus-plus-${SLUG}-${APP_VERSION}.zip"
              ;;
            win32)
              stage_files "*Setup.exe" "restream-chat-plus-plus-${SLUG}-${APP_VERSION}-Setup.exe"
              # Squirrel emits the .nupkg with its own version-bearing name;
              # ship under its original name so Squirrel update math works.
              stage_files "*.nupkg" ""
              # Also stage RELEASES manifest if present (Squirrel update feed)
              stage_files "RELEASES" ""
              ;;
            linux)
              stage_files "*.deb" "restream-chat-plus-plus-${SLUG}-${APP_VERSION}.deb"
              stage_files "*.rpm" "restream-chat-plus-plus-${SLUG}-${APP_VERSION}.rpm"
              ;;
          esac

          echo "--- release-staging ---"
          ls -lah release-staging || true

      - name: Generate SHA-256 checksums
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          set -euo pipefail
          cd release-staging
          shopt -s nullglob
          for f in *.zip *.deb *.rpm; do
            [ -f "$f" ] || continue
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate SHA-256 checksums (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release-staging -Include *.exe,*.nupkg -Recurse
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.slug }}
          path: release-staging/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - compute-version
      - build
    if: needs.compute-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: release-assets

      - name: Show assets
        run: ls -lah release-assets

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.compute-version.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          prev_tag="$(git tag --sort=-version:refname | grep -v "^${tag}$" | head -n1 || true)"

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..HEAD"
            compare_url="https://github.com/${REPO}/compare/${prev_tag}...${tag}"
          else
            range="HEAD"
            compare_url=""
          fi

          {
            echo "## Restream Chat++ ${tag}"
            echo ""
            echo "### Changes"
            echo ""
            git log --oneline ${range} 2>/dev/null | head -50 | sed 's/^/- /' || echo "- Initial release"
            echo ""
            echo "### Downloads"
            echo ""
            echo "macOS (auto-update enabled — pick the matching arch):"
            echo ""
            echo "- Apple Silicon: \`restream-chat-plus-plus-mac-arm64-*.zip\`"
            echo "- Intel: \`restream-chat-plus-plus-mac-x64-*.zip\`"
            echo ""
            echo "Windows: \`restream-chat-plus-plus-win-x64-*-Setup.exe\`"
            echo ""
            echo "Linux: \`restream-chat-plus-plus-linux-x64-*.deb\` or \`.rpm\`"
            echo ""
            if [ -n "${compare_url}" ]; then
              echo "**Full Changelog**: ${compare_url}"
            fi
          } > /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.compute-version.outputs.release_name }}
          prerelease: false
          make_latest: true
          body_path: /tmp/release_body.md
          files: |
            release-assets/*

  update-pages:
    name: Update GitHub Pages version.json
    needs:
      - compute-version
      - publish
    if: needs.compute-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Write version.json
        shell: bash
        env:
          APP_VERSION: ${{ needs.compute-version.outputs.app_version }}
          RELEASE_TAG: ${{ needs.compute-version.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > version.json <<JSON
          {
            "version": "${APP_VERSION}",
            "tag": "${RELEASE_TAG}",
            "releaseUrl": "https://github.com/${REPO}/releases/tag/${RELEASE_TAG}",
            "latestDownloads": {
              "macArm64": "https://github.com/${REPO}/releases/latest/download/restream-chat-plus-plus-mac-arm64-${APP_VERSION}.zip",
              "macX64": "https://github.com/${REPO}/releases/latest/download/restream-chat-plus-plus-mac-x64-${APP_VERSION}.zip",
              "winX64": "https://github.com/${REPO}/releases/latest/download/restream-chat-plus-plus-win-x64-${APP_VERSION}-Setup.exe",
              "linuxX64Deb": "https://github.com/${REPO}/releases/latest/download/restream-chat-plus-plus-linux-x64-${APP_VERSION}.deb",
              "linuxX64Rpm": "https://github.com/${REPO}/releases/latest/download/restream-chat-plus-plus-linux-x64-${APP_VERSION}.rpm"
            },
            "publishedAt": "${date}"
          }
          JSON
          cat version.json

      - name: Commit + push
        shell: bash
        env:
          APP_VERSION: ${{ needs.compute-version.outputs.app_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: bump version.json to ${APP_VERSION}"
          git push origin gh-pages
